<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de dados IoT - Hub de Controle</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(115deg, #000428, #004e92);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            color: #00e0ff;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            color: #ffffff;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid #007bff;
            padding-left: 35px;
        }

        .form-control:focus {
            border-color: #00e0ff;
            box-shadow: 0 0 10px #00e0ff;
        }

        .btn-primary {
            background-color: #00e0ff;
            border: none;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            background-color: #00b4d8;
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            left: 10px;
            top: 10px;
            color: #00e0ff;
        }

        .input-group {
            position: relative;
        }

        .glow-effect {
            text-shadow: 0 0 10px #00e0ff, 0 0 20px #00e0ff, 0 0 30px #00e0ff;
        }

        .background-animation span {
            position: absolute;
            display: block;
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 224, 255, 0.5);
            animation: animate 10s linear infinite;
            border-radius: 50%;
        }

        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="background-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">
        <h1 class="glow-effect">Coletor de dados <div> Hub de Controle </div> </h1>
        <form action="authentication" method="post">
            <div class="mb-4 input-group">
                <span class="input-icon"><i class="bi bi-person-circle"></i></span>
                <input type="text" class="form-control" id="username" name="username" required placeholder="Digite sua identificação">
            </div>
            <div class="mb-4 input-group">
                <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" id="password" name="password" required placeholder="Digite sua senha">
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Acessar Portal</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
