<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Configuração Avançado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/dataTables.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
            margin-bottom: 20px;
        }

        .btn-refresh {
            background-color: #00d4ff;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background-color: #007bff;
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        .table-container {
            margin-top: 20px;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 350px;
            margin-top: 30px;
        }

        .dataTables_wrapper .dataTables_filter input {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
        }

        .dataTables_wrapper .dataTables_length select {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate {
            color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Painel de Configuração Avançado</h1>
        <button class="btn btn-refresh" onclick="refreshData()">
            <i class="bi bi-arrow-clockwise"></i> Atualizar Dados
        </button>

        <!-- Tabela de Dados -->
        <div class="table-container">
            <table id="data-table" class="table table-dark table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Tara</th>
                        <th>Peso (Kg)</th>
                        <th>Mac Address</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td>5</td><td>15</td><td>00:1A:2B:3C:4D:5E</td></tr>
                    <tr><td>2</td><td>10</td><td>25</td><td>11:22:33:44:55:66</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Gráfico Dinâmico -->
        <div class="chart-container">
            <canvas id="dataChart"></canvas>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#data-table').DataTable();
        });

        function refreshData() {
            console.log("Atualizando dados...");
        }

        const data = {
            labels: ['Leitura 1', 'Leitura 2', 'Leitura 3', 'Leitura 4'],
            datasets: [{
                label: 'Peso (Kg)',
                backgroundColor: 'rgba(0, 212, 255, 0.5)',
                borderColor: '#00d4ff',
                data: [12, 19, 3, 5],
                borderWidth: 2
            }]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#ffffff' } }
                },
                scales: {
                    x: { ticks: { color: '#ffffff' } },
                    y: { ticks: { color: '#ffffff' } }
                }
            }
        };

        new Chart(document.getElementById('dataChart'), config);
    </script>
</body>

</html>
